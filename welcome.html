<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Welcome - Data707 System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <!-- นำเข้าไฟล์ JS ให้ถูกต้อง -->
    <script src="config.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/welcome.js"></script>

    <!-- (ใส่ CSS ของคุณตรงนี้ได้เลย ผมขอละไว้เพื่อให้โค้ดสั้นลงนะครับ) -->
    <style>
        body { font-family: 'IBM Plex Sans Thai', sans-serif; background: #0f172a; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: rgba(30, 41, 59, 0.8); padding: 30px; border-radius: 15px; width: 350px; text-align: center; border: 1px solid rgba(148, 163, 184, 0.2); }
        .info-box { background: rgba(15, 23, 42, 0.5); padding: 15px; border-radius: 10px; margin: 20px 0; text-align: left; }
        .row { display: flex; justify-content: space-between; margin-bottom: 10px; }
        .row:last-child { margin-bottom: 0; }
        .text-muted { color: #94a3b8; }
        .text-primary { color: #38bdf8; font-weight: bold; }
        .btn-blue { background: #38bdf8; color: #0f172a; border: none; padding: 12px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
        .btn-dark { background: transparent; color: #f8fafc; border: 1px solid rgba(148, 163, 184, 0.2); padding: 12px; width: 100%; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="card">
        <!-- รูปโปรไฟล์ -->
        <img src="img/profile.png" alt="Profile" style="width: 100px; border-radius: 10px; margin-bottom: 15px;" onerror="this.src='https://via.placeholder.com/100'">
        
        <h2>ยินดีต้อนรับ</h2>

        <!-- กล่องแสดงข้อมูล (ใช้ ID ให้ตรงกับใน JS) -->
        <div class="info-box">
            <div class="row">
                <span class="text-muted">รหัส:</span>
                <span id="user-id" class="text-primary">-</span>
            </div>
            <div class="row">
                <span class="text-muted">ชื่อ:</span>
                <span id="user-name" class="text-primary">-</span>
            </div>
            <div class="row">
                <span class="text-muted">แผนก:</span>
                <span id="user-dept" class="text-primary">-</span>
            </div>
        </div>

        <!-- ปุ่มกดต่างๆ ผูกคำสั่ง onclick เรียบร้อย -->
        <button onclick="playGame()" class="btn-blue">🎮 เล่นเกม Flappy Bird รอ</button>
        <button onclick="logout()" class="btn-dark">🚪 ออกจากระบบ</button>
    </div>

</body>
</html>
